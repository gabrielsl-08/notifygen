{% extends "admin/base_site.html" %}
{% load static %}

{% block content %}
<div class="container mt-4">
    <h2>{{ title }}</h2>
    <form method="post" enctype="multipart/form-data" class="mt-3">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">💾 Salvar e Retirar</button>
        <a href="{% url 'triagem_crr' %}" class="btn btn-secondary">⬅ Voltar</a>
    </form>
</div>
{% endblock %}
