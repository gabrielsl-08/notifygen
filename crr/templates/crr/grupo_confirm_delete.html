{% extends 'crr/base.html' %}

{% block title %}Excluir Grupo | DIVPROM{% endblock %}
{% block page_title %}Excluir Grupo{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body text-center py-5">
        <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3rem;"></i>
        <h4 class="mt-3">Confirmar Exclusão</h4>
        <p class="text-muted">Tem certeza que deseja excluir o grupo <strong>{{ obj.name }}</strong>?</p>
        <form method="post" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger me-2">
                <i class="bi bi-trash"></i> Sim, excluir
            </button>
            <a href="{% url 'crr:grupo_list' %}" class="btn btn-outline-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
