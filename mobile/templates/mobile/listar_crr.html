{% extends 'base.html' %}
{% block content %}
<h2>Meus CRRs</h2>
<ul>
  {% for crr in crrs %}
    <li>
      {{ crr.numero_crr }} - {{ crr.placa_chassi }}
      [<a href="{% url 'crr_mobile:imprimir_crr' crr.pk %}">Imprimir</a>]
    </li>
  {% empty %}
    <li>Você ainda não cadastrou nenhum CRR.</li>
  {% endfor %}
</ul>
{% endblock %}
